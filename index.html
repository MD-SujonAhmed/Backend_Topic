<!DOCTYPE html>
<html lang="en">
<head>
    <title>SkillShare Pro Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
    <div class="container">
        <h2>Module 1, 2, 3 Demo</h2>
        
        <!-- Registration & Login -->
        <div id="auth-box" class="card p-3 mb-4">
            <h4>Login / Register</h4>
            <input type="text" id="user" class="form-control mb-2" placeholder="Username">
            <input type="password" id="pass" class="form-control mb-2" placeholder="Password">
            <button onclick="login()" class="btn btn-primary">Login (JWT)</button>
        </div>

        <!-- Blog List -->
        <div id="blog-box" style="display:none;">
            <h4>Blogs (REST API CRUD)</h4>
            <div id="blog-list" class="mb-3"></div>
            <input type="text" id="title" class="form-control mb-2" placeholder="Blog Title">
            <textarea id="content" class="form-control mb-2" placeholder="Blog Content"></textarea>
            <button onclick="createBlog()" class="btn btn-success">Create Blog</button>
        </div>
    </div>

    <script>
        let API_URL = "http://127.0.0.1:8000/api/";
        let token = "";

        async function login() {
            let user = document.getElementById('user').value;
            let pass = document.getElementById('pass').value;
            
            let res = await fetch(API_URL + "login/", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username: user, password: pass})
            });
            let data = await res.json();
            if(data.access) {
                token = data.access;
                alert("Login Success! Token: " + token.substring(0,20) + "...");
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('blog-box').style.display = 'block';
                loadBlogs();
            }
        }

        async function loadBlogs() {
            let res = await fetch(API_URL + "blogs/", {
                headers: {"Authorization": "Bearer " + token}
            });
            let blogs = await res.json();
            let listHTML = "";
            blogs.forEach(b => {
                listHTML += `<div class="alert alert-info"><b>${b.title}</b> by ${b.author}</div>`;
            });
            document.getElementById('blog-list').innerHTML = listHTML;
        }

        async function createBlog() {
            let title = document.getElementById('title').value;
            let content = document.getElementById('content').value;
            await fetch(API_URL + "blogs/", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + token,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({title, content})
            });
            loadBlogs();
        }
    </script>
</body>
</html>
